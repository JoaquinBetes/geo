# =============================================================================
#  CONFLICTO: INDIA – PAKISTÁN
#  Dos potencias nucleares con Cachemira como teatro permanente. Ciclo actual:
#  atentado de Pahalgam y Operación Sindoor (2025), Tratado del Indo suspendido.
# =============================================================================

id = "india_pakistan"
name = "India–Pakistán"
description = "Cobertura mediática del conflicto entre India y Pakistán"
start_date = "2025-04-22"   # atentado de Pahalgam: inicio del ciclo actual
order = 4

[[countries]]
code = "IN"
name = "India"
iso3 = "IND"
geo = "geo/in_adm1.json"

[[countries]]
code = "PK"
name = "Pakistán"
iso3 = "PAK"
geo = "geo/pk_adm1.json"

# Eje del conflicto: Cachemira y términos del enfrentamiento. Sin "india" a
# secas (traería toda la actualidad india no relacionada).
keywords = [
  "pakistan", "pakistani", "kashmir", "kashmiri", "line of control",
  "pahalgam", "sindoor", "indo-pak", "indus water", "rawalpindi",
  "wagah", "siachen",
]

