# =============================================================================
#  CONFLICTO: COREA DEL NORTE – COREA DEL SUR
#  Armisticio sin tratado de paz desde 1953. Ciclo actual: Pyongyang enterró
#  la reunificación y declaró al Sur "principal enemigo" (enero 2024), con el
#  eje Pyongyang-Moscú como novedad estratégica.
# =============================================================================

id = "korea_peninsula"
name = "Corea del Norte–Corea del Sur"
description = "Cobertura mediática de la tensión en la península coreana"
start_date = "2024-01-15"   # Kim declara al Sur "principal enemigo" y entierra la reunificación
order = 5

[[countries]]
code = "KP"
name = "Corea del Norte"
iso3 = "PRK"
geo = "geo/kp_adm1.json"

[[countries]]
code = "KR"
name = "Corea del Sur"
iso3 = "KOR"
geo = "geo/kr_adm1.json"

# Eje del conflicto: el Norte y la frontera (las noticias sólo del Sur no
# entran salvo que mencionen a Pyongyang o la DMZ).
keywords = [
  "north korea", "north korean", "pyongyang", "kim jong", "dprk",
  "dmz", "panmunjom", "yongbyon", "punggye",
]

# -----------------------------------------------------------------------------
#  FEEDS RSS (verificados 2026-07; Korea Herald/Times sin RSS operativo —
#  Yonhap y la prensa surcoreana llegan vía Google News)
# -----------------------------------------------------------------------------

