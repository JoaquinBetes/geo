# Actualizar de vez en cuando desde https://www.ifw-kiel.de/topics/war-against-ukraine/ukraine-support-tracker/

[economy.aid]
as_of = "2025-12"
source = "Kiel Institute Ukraine Support Tracker (cifras aproximadas)"
