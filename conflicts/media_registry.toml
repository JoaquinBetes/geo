# =============================================================================
#  REGISTRO GLOBAL DE MEDIOS (compartido por todos los conflictos)
#  El pipeline cruza las fuentes reales de cada conflicto contra este registro
#  (match por substring, EL ORDEN IMPORTA: el primero que coincide gana).
#  iso3 = país de la SEDE (para el mapa y RSF); country = etiqueta visible.
#  type: estatal | público | privado | agencia | exilio | think tank | especializado
#  Curado a mano: revisar de tanto en tanto. Coordenadas a nivel ciudad.
# =============================================================================

rsf_as_of = "2025 (aprox.)"

# Ranking de libertad de prensa de Reporteros Sin Fronteras por país sede
# (1 = más libre, 180 = menos libre). Valores aproximados.
