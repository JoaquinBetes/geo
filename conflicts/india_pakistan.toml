# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
# -----------------------------------------------------------------------------

[economy]
baseline_label = "pre-crisis"
note = "Las dos rupias miden la presión sobre cada economía (la paquistaní, crónicamente frágil y dependiente del FMI); el Sensex refleja cuánto castiga el mercado la escalada; el Brent pega en ambos, grandes importadores de energía. Línea base: atentado de Pahalgam (abr 2025)."

[[economy.markets]]
id = "usdinr"
name = "USD/INR (rupia india)"
unit = "₹ por USD"
group = "fx"
symbol = "INR=X"
desc = "Cuántas rupias indias por dólar. Si sube, la rupia se deprecia: los inversores sacan capital de India cuando la crisis escala, y las importaciones (sobre todo energía) se encarecen."

[[economy.markets]]
id = "usdpkr"
name = "USD/PKR (rupia paquistaní)"
unit = "PKR por USD"
group = "fx"
symbol = "PKR=X"
desc = "Cuántas rupias paquistaníes por dólar. La economía de Pakistán es crónicamente frágil (reservas escasas, programas del FMI): su rupia es de las primeras víctimas de cada escalada."

[[economy.markets]]
id = "sensex"
name = "Sensex (Bolsa de Bombay)"
unit = "puntos"
group = "equity"
symbol = "^BSESN"
desc = "El índice de la Bolsa de Bombay: la confianza en la economía india. Las escaladas lo golpean; la velocidad de su recuperación mide cuán creíble le parece al mercado la desescalada."

[[economy.markets]]
id = "brent"
name = "Petróleo Brent"
unit = "USD/barril"
group = "commodity"
symbol = "BZ=F"
desc = "El crudo de referencia mundial. India y Pakistán importan casi toda su energía: un Brent caro castiga a ambas economías, sin importar quién gane el round diplomático."

# -----------------------------------------------------------------------------
#  PESTAÑA INFLUENCIA
# -----------------------------------------------------------------------------

[influence]
as_of = "2026-01"
reference = "Ejes de suministro militar y respaldo diplomático; dos potencias nucleares fuera del TNP (ojivas: estimaciones SIPRI)"
note = "India compra armas a Rusia, Francia, EE.UU. e Israel a la vez — el no alineamiento hecho doctrina. Pakistán depende de China (su 'aliado de todo clima') y de Turquía. Casi nadie más quiere elegir bando entre 1.600 millones de personas: el Golfo financia a ambos y Occidente corteja a India sin soltar a Islamabad."

[[influence.kpis]]
label = "Socios estratégicos de India"
value = "7"

[[influence.kpis]]
label = "Socios estratégicos de Pakistán"
value = "3"

[[influence.kpis]]
label = "Ojivas nucleares de India"
value = "~172"

[[influence.kpis]]
label = "Ojivas nucleares de Pakistán"
value = "~170"

[[influence.categories]]
id = "india_partners"
label = "Socio estratégico de India"
color = "cyan"
countries = ["IND", "USA", "FRA", "RUS", "ISR", "GBR", "JPN", "AUS"]

[[influence.categories]]
id = "pak_partners"
label = "Socio estratégico de Pakistán"
color = "red"
countries = ["PAK", "CHN", "TUR", "AZE"]

[[influence.categories]]
id = "neutral"
label = "No alineado / equilibrista"
color = "amber"
rest = true

[[influence.categories]]
id = "nodata"
label = "Sin datos"
color = "gray"
nodata = true
countries = ["KOS", "PSE", "ESH", "SOL", "CYN", "GRL", "NCL", "PRI", "FLK", "ATF"]

