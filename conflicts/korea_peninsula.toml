# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
#  Corea del Norte no tiene mercados abiertos: el pulso se mide en el won
#  surcoreano, el KOSPI, el yen (refugio regional) y el oro (miedo global).
# -----------------------------------------------------------------------------

[economy]
baseline_label = "pre-crisis"
note = "El won y el KOSPI absorben cada lanzamiento y cada amenaza; el yen actúa de refugio regional cuando la península se tensa; el oro mide el miedo global. La economía norcoreana es opaca: no hay mercado que la cotice. Línea base: doctrina de los 'dos Estados hostiles' de Kim (ene 2024)."

[[economy.markets]]
id = "usdkrw"
name = "USD/KRW (won surcoreano)"
unit = "₩ por USD"
group = "fx"
symbol = "KRW=X"
desc = "Cuántos wones por dólar. Si sube, los inversores se cubren ante el riesgo coreano: es el primer lugar donde se ve el miedo cuando Pyongyang escala."

[[economy.markets]]
id = "kospi"
name = "KOSPI (Bolsa de Seúl)"
unit = "puntos"
group = "equity"
symbol = "^KS11"
desc = "El índice bursátil de Seúl (Samsung, Hyundai, SK...). Históricamente resistente a las provocaciones del Norte — cuando cae por geopolítica y no por economía, la cosa es seria."

[[economy.markets]]
id = "usdjpy"
name = "USD/JPY (yen japonés)"
unit = "¥ por USD"
group = "fx"
symbol = "JPY=X"
desc = "Cuántos yenes por dólar. El yen es el refugio regional de Asia: en una crisis coreana tiende a FORTALECERSE (el USD/JPY baja) porque el capital busca resguardo en Japón."

[[economy.markets]]
id = "gold"
name = "Oro"
unit = "USD/onza troy"
group = "commodity"
symbol = "GC=F"
desc = "El refugio global: sube cuando el mundo teme una guerra, en cualquier parte. Complementa al yen como medidor del miedo — uno regional, el otro planetario."

# -----------------------------------------------------------------------------
#  PESTAÑA INFLUENCIA
# -----------------------------------------------------------------------------

[influence]
as_of = "2026-01"
reference = "Armisticio de 1953 (nunca hubo tratado de paz), Estados del Comando de las Naciones Unidas y el eje Pyongyang–Moscú–Pekín"
note = "Desde 2024 Pyongyang ya no habla de reunificación: el Sur es un 'Estado enemigo'. La novedad estratégica es el eje con Moscú — municiones y tropas norcoreanas a cambio de tecnología y comida. Enfrente, el Comando de la ONU que combatió en 1950-53 sigue formalmente vigente."

[[influence.kpis]]
label = "Estados del Comando ONU"
value = "17"

[[influence.kpis]]
label = "Respaldan a Pyongyang"
value = "7"

[[influence.kpis]]
label = "Ojivas norcoreanas (est.)"
value = "~50"

[[influence.kpis]]
label = "Tropas de EE.UU. en el Sur"
value = "28.500"

[[influence.categories]]
id = "unc"
label = "Comando ONU / aliados de Seúl"
color = "cyan"
countries = [
  "KOR", "USA", "GBR", "AUS", "CAN", "FRA", "NLD", "NZL", "PHL", "THA",
  "TUR", "COL", "BEL", "GRC", "DNK", "ITA", "NOR",
]

[[influence.categories]]
