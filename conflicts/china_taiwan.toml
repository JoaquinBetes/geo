# =============================================================================
#  CONFLICTO: CHINA – TAIWÁN
#  Tercer conflicto del monitor. A diferencia de los otros dos no hay guerra
#  abierta: se monitorea la ESCALADA (maniobras, patrullas, bloqueos, chips).
# =============================================================================

id = "china_taiwan"
name = "China–Taiwán"
description = "Cobertura mediática de la tensión entre China y Taiwán"
start_date = "2024-05-20"   # asunción de Lai Ching-te: inicio del ciclo actual de presión
order = 3

[[countries]]
code = "CN"
name = "China"
iso3 = "CHN"
geo = "geo/cn_adm1.json"

[[countries]]
code = "TW"
name = "Taiwán"
iso3 = "TWN"
geo = "geo/tw_adm1.json"

# Filtro centrado en el eje Taiwán: las notas de China sobre otros temas
# (economía, comercio) no entran si no mencionan el estrecho.
keywords = [
  "taiwan", "taiwanese", "taipei", "cross-strait", "kinmen", "matsu",
  "penghu", "tsmc", "lai ching-te", "one china", "reunification",
]

