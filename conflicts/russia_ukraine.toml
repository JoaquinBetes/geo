# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
#  Series de mercado (Yahoo Finance, semanal, sin API key) + snapshot curado de
#  ayuda internacional. baseline: el frontend calcula la variación % contra la
#  última cotización previa a start_date.
# -----------------------------------------------------------------------------

[economy]
note = "El petróleo financia el presupuesto ruso; el trigo mide el impacto en seguridad alimentaria global; el rublo y la grivna son el pulso financiero de cada bando."

[[economy.markets]]
id = "brent"
name = "Petróleo Brent"
unit = "USD/barril"
group = "commodity"
symbol = "BZ=F"

[[economy.markets]]
id = "wheat"
name = "Trigo (Chicago)"
unit = "¢/bushel"
group = "commodity"
symbol = "ZW=F"

[[economy.markets]]
id = "natgas"
name = "Gas natural (Henry Hub)"
unit = "USD/MMBtu"
group = "commodity"
symbol = "NG=F"

[[economy.markets]]
id = "usdrub"
name = "USD/RUB (rublo ruso)"
unit = "₽ por USD"
group = "fx"
symbol = "RUB=X"

[[economy.markets]]
id = "usduah"
name = "USD/UAH (grivna ucraniana)"
unit = "₴ por USD"
group = "fx"
symbol = "UAH=X"

# -----------------------------------------------------------------------------
#  PESTAÑA INFLUENCIA (soft power)
#  Mapamundi de alineamiento: voto en la ONU + sanciones (snapshot CURADO,
#  actualizar as_of cuando se revise) y mapeo medio -> país sede para medir
#  desde dónde se narra el conflicto (esto último se calcula solo).
# -----------------------------------------------------------------------------

[influence]
as_of = "2026-01"
reference = "Res. ES-11/1 (2 mar 2022): condena de la invasión — 141 a favor, 5 en contra, 35 abstenciones, 12 ausentes"
note = "El alineamiento combina dos señales: sancionar a Rusia (compromiso material) y el voto en la Asamblea General (posición declarativa). Muchos países condenaron sin sancionar: ahí vive el 'Sur Global' no alineado."

# KPIs de la pestaña (curados; el color sigue el orden de las categorías)
[[influence.kpis]]
label = "Sancionan a Rusia"
value = "43"

[[influence.kpis]]
label = "Condenaron en ONU"
value = "141"

[[influence.kpis]]
label = "Se abstuvieron"
value = "35"

[[influence.kpis]]
label = "Con Rusia"
value = "5"

# --- Categorías del mapamundi (esquema genérico) ---
# Un país cae en la primera categoría cuya lista lo contenga; los no listados
# caen en la que tiene rest = true. Colores: cyan/green/amber/red/gray.

[[influence.categories]]
id = "sanction"
label = "Condena y sanciona"
color = "cyan"
countries = [
  "USA", "CAN", "GBR", "UKR", "JPN", "KOR", "AUS", "NZL", "SGP", "TWN",
  "NOR", "ISL", "CHE",
  "AUT", "BEL", "BGR", "HRV", "CYP", "CZE", "DNK", "EST", "FIN", "FRA",
  "DEU", "GRC", "HUN", "IRL", "ITA", "LVA", "LTU", "LUX", "MLT", "NLD",
  "POL", "PRT", "ROU", "SVK", "SVN", "ESP", "SWE",
  "MNE", "MKD", "ALB",
]

[[influence.categories]]
id = "condemn"
label = "Condena sin sancionar"
color = "green"
rest = true    # el resto de la Asamblea votó a favor de la condena

[[influence.categories]]
id = "abstain"
label = "Ambiguo (abstención)"
color = "amber"
countries = [
  "DZA", "AGO", "ARM", "BGD", "BOL", "BDI", "CAF", "CHN", "COG", "CUB",
  "SLV", "GNQ", "IND", "IRN", "IRQ", "KAZ", "KGZ", "LAO", "MDG", "MLI",
  "MNG", "MOZ", "NAM", "NIC", "PAK", "SEN", "ZAF", "SSD", "LKA", "SDN",
  "TJK", "TZA", "UGA", "VNM", "ZWE",
]

[[influence.categories]]
id = "against"
label = "Alineado con Rusia"
color = "red"
countries = ["RUS", "BLR", "PRK", "SYR", "ERI"]

[[influence.categories]]
id = "nodata"
label = "Sin voto / sin datos"
color = "gray"
nodata = true
countries = [
  # ausentes o suspendidos en la votación
  "AZE", "BFA", "CMR", "SWZ", "ETH", "GIN", "GNB", "MAR", "TGO", "TKM",
  "UZB", "VEN",
  # territorios del mapa sin voto en la ONU
  "KOS", "PSE", "ESH", "SOL", "CYN", "GRL", "NCL", "PRI", "FLK", "ATF",
]

