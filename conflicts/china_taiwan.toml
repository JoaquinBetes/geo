# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
# -----------------------------------------------------------------------------

[economy]
baseline_label = "pre-crisis"
note = "TSMC fabrica ~90% de los chips más avanzados del mundo: su cotización es el termómetro del riesgo de bloqueo. El dólar taiwanés y el yuan miden la presión financiera sobre cada orilla; por el estrecho pasa cerca de la mitad del tráfico mundial de contenedores. Línea base: asunción de Lai Ching-te (may 2024)."

[[economy.markets]]
id = "tsmc"
name = "TSMC (ADR, NYSE)"
unit = "USD"
group = "equity"
symbol = "TSM"
desc = "La acción de Taiwan Semiconductor en Nueva York: el fabricante de ~90% de los chips avanzados del planeta. Si cae con fuerza, el mercado está poniendo precio al riesgo de bloqueo o invasión de la isla."

[[economy.markets]]
id = "twii"
name = "Índice bursátil de Taipéi"
unit = "puntos"
group = "equity"
symbol = "^TWII"
desc = "El índice de la bolsa taiwanesa: mide la confianza de los inversores en que la isla sigue siendo un lugar seguro para hacer negocios. Cae cuando las maniobras chinas asustan al capital."

[[economy.markets]]
id = "usdtwd"
name = "USD/TWD (dólar taiwanés)"
unit = "NT$ por USD"
group = "fx"
symbol = "TWD=X"
desc = "Cuántos dólares taiwaneses por dólar de EE.UU. Si sube, hay salida de capitales de la isla (miedo a la escalada); si baja, el dinero vuelve."

[[economy.markets]]
id = "usdcny"
name = "USD/CNY (yuan chino)"
unit = "¥ por USD"
group = "fx"
symbol = "CNY=X"
desc = "Cuántos yuanes por dólar. Pekín administra su cotización: una depreciación puede ser síntoma de presión económica (sanciones, salida de capitales) o un arma comercial deliberada — leerlo requiere contexto."

# -----------------------------------------------------------------------------
#  PESTAÑA INFLUENCIA
#  Acá el alineamiento es el reconocimiento diplomático (política de "Una sola
#  China") + la arquitectura de seguridad del Indo-Pacífico.
# -----------------------------------------------------------------------------

[influence]
as_of = "2026-01"
reference = "Reconocimiento diplomático bajo la política de 'Una sola China' + arquitectura de seguridad del Indo-Pacífico"
note = "Sólo ~12 estados reconocen formalmente a Taiwán (ROC), casi todos pequeños (varios microestados insulares no son visibles en el mapa). El resto del mundo reconoce a la RPC — pero la red de socios de seguridad de EE.UU. cuenta otra historia: la diplomacia formal y el alineamiento estratégico van por carriles separados."

[[influence.kpis]]
label = "Reconocen a Taiwán (ROC)"
value = "~12"

[[influence.kpis]]
label = "Red de seguridad EE.UU."
value = "8"

[[influence.kpis]]
label = "Reconocen a la RPC"
value = "~170"

[[influence.kpis]]
label = "Alineados con Beijing"
value = "11"

[[influence.categories]]
id = "recognize"
label = "Taiwán y quienes lo reconocen"
color = "green"
countries = ["TWN", "GTM", "PRY", "BLZ", "HTI", "SWZ"]

[[influence.categories]]
id = "security"
label = "Red de seguridad EE.UU.–aliados"
color = "cyan"
countries = ["USA", "JPN", "KOR", "PHL", "AUS", "NZL", "GBR", "CAN"]

[[influence.categories]]
id = "status_quo"
label = "Reconoce a la RPC (statu quo)"
color = "amber"
rest = true

[[influence.categories]]
id = "pro_beijing"
label = "Alineado con Beijing"
color = "red"
countries = ["RUS", "PRK", "BLR", "IRN", "PAK", "KHM", "LAO", "MMR", "VEN", "CUB", "NIC"]

[[influence.categories]]
id = "nodata"
label = "Sin datos"
color = "gray"
nodata = true
countries = ["KOS", "PSE", "ESH", "SOL", "CYN", "GRL", "NCL", "PRI", "FLK", "ATF"]

