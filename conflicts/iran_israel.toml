# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
#  El rial iraní no cotiza en mercados abiertos (tipo oficial ficticio), así
#  que el pulso financiero se mide con petróleo, oro y el shekel.
# -----------------------------------------------------------------------------

[economy]
note = "El petróleo es el termómetro del estrecho de Ormuz (por ahí pasa una quinta parte del crudo mundial); el oro mide el miedo global a la escalada; el shekel, la presión sobre la economía israelí. El rial iraní no cotiza en mercados abiertos."

[[economy.markets]]
id = "brent"
name = "Petróleo Brent"
unit = "USD/barril"
group = "commodity"
symbol = "BZ=F"
desc = "El crudo de referencia mundial (Mar del Norte), la vara con la que se cotiza el petróleo de Europa, África y Medio Oriente. Cualquier amenaza sobre el estrecho de Ormuz (una quinta parte del crudo global) lo dispara: es el termómetro del riesgo de guerra mayor."

[[economy.markets]]
id = "wti"
name = "Petróleo WTI"
unit = "USD/barril"
group = "commodity"
symbol = "CL=F"
desc = "West Texas Intermediate, el crudo de referencia de EE.UU. (entrega en Cushing, Oklahoma). Suele valer unos dólares menos que el Brent por costos logísticos; si la brecha entre ambos se agranda, el shock golpea sobre todo fuera de América."

[[economy.markets]]
id = "gold"
name = "Oro"
unit = "USD/onza troy"
group = "commodity"
symbol = "GC=F"
desc = "El refugio clásico: cuando los mercados temen una guerra o inflación, compran oro. Una suba fuerte y sostenida significa que el mundo está nervioso — no importa dónde viva el inversor."

[[economy.markets]]
id = "usdils"
name = "USD/ILS (shekel israelí)"
unit = "₪ por USD"
group = "fx"
symbol = "ILS=X"
desc = "Cuántos shekels por dólar. Si sube, el mercado castiga a la economía israelí (riesgo bélico, salida de capitales, encarecimiento de importaciones); si baja, señal de confianza en que la crisis está contenida."

# -----------------------------------------------------------------------------
#  PESTAÑA INFLUENCIA
# -----------------------------------------------------------------------------

[influence]
as_of = "2026-01"
reference = "Sanciones nucleares/misilísticas sobre Irán y mecanismo 'snapback' del JCPOA activado por el E3 (sept. 2025), que restauró las sanciones de la ONU"
note = "A diferencia de Ucrania, acá no hay un voto único de la Asamblea General que sirva de foto: el alineamiento se lee por sanciones a Irán, acuerdos con Israel y apoyo material a Teherán. La gran mayoría del mundo es genuinamente no alineada en este conflicto."

[[influence.kpis]]
