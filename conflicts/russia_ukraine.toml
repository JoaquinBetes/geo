# -----------------------------------------------------------------------------
#  PESTAÑA ECONÓMICA
#  Series de mercado (Yahoo Finance, semanal, sin API key) + snapshot curado de
#  ayuda internacional. baseline: el frontend calcula la variación % contra la
#  última cotización previa a start_date.
# -----------------------------------------------------------------------------

[economy]
note = "El petróleo financia el presupuesto ruso; el trigo mide el impacto en seguridad alimentaria global; el rublo y la grivna son el pulso financiero de cada bando."

[[economy.markets]]
id = "brent"
name = "Petróleo Brent"
unit = "USD/barril"
group = "commodity"
symbol = "BZ=F"

[[economy.markets]]
id = "wheat"
name = "Trigo (Chicago)"
unit = "¢/bushel"
group = "commodity"
symbol = "ZW=F"

[[economy.markets]]
id = "natgas"
name = "Gas natural (Henry Hub)"
unit = "USD/MMBtu"
group = "commodity"
symbol = "NG=F"

[[economy.markets]]
id = "usdrub"
name = "USD/RUB (rublo ruso)"
unit = "₽ por USD"
group = "fx"
symbol = "RUB=X"

[[economy.markets]]
id = "usduah"
name = "USD/UAH (grivna ucraniana)"
unit = "₴ por USD"
group = "fx"
symbol = "UAH=X"

# --- Ayuda internacional a Ucrania (asignaciones, miles de millones de €) ---
