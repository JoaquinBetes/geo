# =============================================================================
#  CONFIGURACIÓN DE UN CONFLICTO
# -----------------------------------------------------------------------------
#  Para AGREGAR OTRO CONFLICTO (ej. China-Taiwán) copiás este archivo a
#  conflicts/china_taiwan.toml, cambiás id/name/feeds/keywords/entities y listo.
#  El pipeline levanta automáticamente todos los .toml de esta carpeta.
# =============================================================================

id = "russia_ukraine"
name = "Rusia–Ucrania"
description = "Cobertura mediática del conflicto entre Rusia y Ucrania"
start_date = "2022-02-24"   # inicio de la invasión a gran escala (para baselines)
order = 1                   # posición en el selector del dashboard

# Países del conflicto: alimentan los mapas comparativos lado a lado.
# 'geo' apunta al GeoJSON de límites regionales servido junto al dashboard
# (geoBoundaries gbOpen, CC-BY 4.0, simplificado).
[[countries]]
code = "UA"
name = "Ucrania"
geo = "geo/ua_adm1.json"

[[countries]]
code = "RU"
name = "Rusia"
geo = "geo/ru_adm1.json"

# Un artículo se incluye sólo si su título o resumen contiene al menos una de
# estas palabras (sin distinguir mayúsculas). Filtra el ruido de los feeds
# generalistas (deportes, cultura, etc.). Dejá la lista vacía para no filtrar.
keywords = [
  "ukraine", "ukrainian", "russia", "russian", "kyiv", "kiev",
  "moscow", "putin", "zelensky", "zelenskyy", "donbas", "donbass",
  "crimea", "bakhmut", "kremlin", "nato",
]

# -----------------------------------------------------------------------------
#  FEEDS RSS
#  - source: etiqueta del medio que se muestra en el dashboard.
#  - aggregator = true: para feeds que juntan varios medios (Google News).
#    En ese caso el medio real se toma de cada artículo, no de 'source'.
# -----------------------------------------------------------------------------

[[feeds]]
source = "Google News"
aggregator = true
url = "https://news.google.com/rss/search?q=ukraine%20russia%20war&hl=en-US&gl=US&ceid=US:en"

[[feeds]]
source = "Al Jazeera"
url = "https://www.aljazeera.com/xml/rss/all.xml"

[[feeds]]
source = "The Guardian"
url = "https://www.theguardian.com/world/ukraine/rss"

[[feeds]]
source = "BBC"
url = "https://feeds.bbci.co.uk/news/world/rss.xml"

[[feeds]]
source = "NPR"
url = "https://feeds.npr.org/1004/rss.xml"

# -----------------------------------------------------------------------------
#  ENTIDADES A TRACKEAR (gazetteer)
#  Contamos menciones y sentimiento asociado a cada una. 'aliases' cubre
#  variantes y errores comunes. Evitá alias muy cortos/ambiguos (us, un, eu)
#  porque generan falsos positivos con palabras comunes en inglés.
# -----------------------------------------------------------------------------

[[entities]]
name = "Vladimir Putin"
type = "PERSON"
aliases = ["putin"]

[[entities]]
name = "Volodymyr Zelensky"
type = "PERSON"
aliases = ["zelensky", "zelenskyy", "zelenskiy"]

[[entities]]
name = "Donald Trump"
type = "PERSON"
aliases = ["trump"]

[[entities]]
name = "Sergei Lavrov"
type = "PERSON"
aliases = ["lavrov"]

[[entities]]
name = "Russia"
type = "LOCATION"
aliases = ["russian", "kremlin"]

[[entities]]
name = "Ukraine"
type = "LOCATION"
aliases = ["ukrainian"]

[[entities]]
name = "United States"
type = "LOCATION"
aliases = ["washington", "white house"]

[[entities]]
name = "Kyiv"
type = "LOCATION"
aliases = ["kiev"]

[[entities]]
name = "Moscow"
type = "LOCATION"
aliases = []

[[entities]]
name = "Crimea"
type = "LOCATION"
aliases = []

[[entities]]
name = "Donbas"
type = "LOCATION"
aliases = ["donbass"]

[[entities]]
name = "NATO"
type = "ORG"
aliases = []

[[entities]]
name = "European Union"
type = "ORG"
aliases = ["european union"]

[[entities]]
name = "United Nations"
type = "ORG"
aliases = ["united nations"]

# -----------------------------------------------------------------------------
#  PESTAÑA MILITAR
#  Los eventos se extraen de los artículos ya scrapeados: si un artículo con
#  vocabulario militar menciona un lugar del gazetteer de abajo, se geolocaliza.
#  Las pérdidas vienen de un dataset público (reclamo del Estado Mayor ucraniano).
# -----------------------------------------------------------------------------

[military]
losses_personnel_url = "https://raw.githubusercontent.com/PetroIvaniuk/2022-Ukraine-Russia-War-Dataset/main/data/russia_losses_personnel.json"
losses_equipment_url = "https://raw.githubusercontent.com/PetroIvaniuk/2022-Ukraine-Russia-War-Dataset/main/data/russia_losses_equipment.json"
losses_label = "Bajas rusas (reclamo ucr.)"
losses_caveat = "Pérdidas rusas según el Estado Mayor de Ucrania: estimación de una de las partes, no verificada de forma independiente."
events_caveat = "Eventos extraídos automáticamente de titulares de prensa (no confirmación en terreno). La geolocalización es a nivel ciudad/zona."

