# =============================================================================
#  CONFLICTO: IRÁN – ISRAEL / ESTADOS UNIDOS
#  Creado copiando la estructura de russia_ukraine.toml (la prueba de que
#  agregar un conflicto es sólo escribir configuración).
# =============================================================================

id = "iran_israel"
name = "Irán–Israel/EE.UU."
description = "Cobertura mediática del conflicto entre Irán, Israel y Estados Unidos"
start_date = "2025-06-13"   # inicio de la guerra directa Israel-Irán (jun 2025)
order = 2

# Países del conflicto para los mapas comparativos lado a lado.
[[countries]]
code = "IR"
name = "Irán"
iso3 = "IRN"
geo = "geo/ir_adm1.json"

[[countries]]
code = "IL"
name = "Israel"
iso3 = "ISR"
geo = "geo/il_adm1.json"

# Sin 'geo': se pinta en el mapamundi de la portada como parte del conflicto,
# pero no participa de las coropletas comparativas (que son Irán | Israel).
[[countries]]
code = "US"
name = "Estados Unidos"
iso3 = "USA"

# Filtro de relevancia: pedimos términos del eje Irán (los feeds israelíes
# generalistas traen mucha política doméstica que no es de este conflicto).
keywords = [
  "iran", "iranian", "tehran", "khamenei", "irgc", "revolutionary guard",
  "hezbollah", "hizbollah", "hormuz", "natanz", "fordow", "fordo",
  "houthi", "houthis", "pezeshkian", "mossad", "ayatollah",
]

